name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-shared:
    name: Shared - Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/shared
      - run: npm test -w packages/shared

  test-server:
    name: Server - Test
    runs-on: ubuntu-latest
    needs: test-shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/shared
      - run: cd packages/server && npx prisma generate
      - name: Run tests (excluding socket simulations)
        run: >
          npx vitest run
          --exclude 'src/socket-sim.test.ts'
          --exclude 'src/socket-sim-100.test.ts'
        working-directory: packages/server

  typecheck-app:
    name: App - Typecheck
    runs-on: ubuntu-latest
    needs: test-shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/shared
      - run: cd packages/app && npx tsc --noEmit

  lint-rn-safety:
    # AST linter that blocks top-level Web API calls (window / document /
    # localStorage / AudioContext / etc). A pre-commit hook also runs this,
    # but hooks can be bypassed with --no-verify — this job is the hard
    # gate. Regression test for the 2026-04-13 sound.ts white-screen bug
    # (CLAUDE.md §13 #1).
    name: App - RN safety lint
    runs-on: ubuntu-latest
    needs: test-shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node packages/app/scripts/lint-rn-safety.mjs

  build:
    name: Server - Build
    runs-on: ubuntu-latest
    needs: [test-server, typecheck-app]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/shared
      - run: cd packages/server && npx prisma generate
      - run: npm run build -w packages/server
